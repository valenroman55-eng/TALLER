<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>

    <style>
        .caja1{
            width: 700px;
            font-size: 20px;
            color: rgb(0, 0, 0);
            background-color: rgb(40, 243, 108);
            padding: 30px;
            margin: 50px;
        }

        button{
            width: 200px;
            height: 100px;
            font-size: 50px;
            background-color: rgb(108, 247, 166);
            border-radius: 50px;
            cursor: pointer;
            border: 5px solid rgb(40, 243, 108);
        }

    </style>
</head>
<body>
    <h1>javascript</h1>
    <div class="caja1">
       <p id="texto">JavaScript (JS) es el lenguaje de programación principal de la web. Se utiliza principalmente para dotar a las páginas y aplicaciones web de interactividad, dinamismo y funcionalidad.</p> 
    </div>

    <button id="btn_ocultar">Ocultar</button>

    <button id="btn_mostrar">Mostrar</button>

    <script>
        const texto = document.getElementById("texto");
        const botonocultar = document.getElementById("btn_ocultar");
        botonocultar.addEventListener("click", function(){
            texto.style.display="none";
        })
        const botonmostrar = document.getElementById("btn_mostrar");
        botonmostrar.addEventListener("click", function(){
            texto.style.display="block";
        })

    </script>

</body>
</html>
